<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login & Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
	  <link rel="stylesheet" href="style.css">
	<style>
      .form-container {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background-color: #FAE8EE;
        border-radius: 10px;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
      }
    </style>
  </head>
  <body>
  
  <a class="nav-link fs-2" href="newest_watches.html">
	<i class="bi bi-house-fill"></i>
	</a>
  
    <div class="container">
      <div class="form-container">
        <div id="login-form">
          <h3 class="text-center mb-4">Login</h3>
          <form>
            <div class="mb-3">
              <label for="loginEmail" class="form-label">Email or Username</label>
              <input type="text" class="form-control" id="loginEmail" placeholder="Enter email or username">
            </div>
            <div class="mb-3">
              <label for="loginPassword" class="form-label">Password</label>
              <input type="password" class="form-control" id="loginPassword" placeholder="Enter password">
            </div>
            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
            <p class="text-center">Don't have an account? 
              <span class="form-toggle" onclick="toggleForms()">Register here</span>
            </p>
          </form>
        </div>
        
        <div id="register-form" style="display: none;">
          <h3 class="text-center mb-4">Register</h3>
          <form>
            <div class="mb-3">
              <label for="regName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="regName" placeholder="Enter your full name">
            </div>
            <div class="mb-3">
              <label for="regEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="mb-3">
              <label for="regUsername" class="form-label">Username</label>
              <input type="text" class="form-control" id="regUsername" placeholder="Choose a username">
            </div>
            <div class="mb-3">
              <label for="regPassword" class="form-label">Password</label>
              <input type="password" class="form-control" id="regPassword" placeholder="Enter password">
            </div>
            <div class="mb-3">
              <label for="regConfirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm password">
            </div>
            <div class="mb-3">
              <label for="regAge" class="form-label">Age</label>
              <input type="number" class="form-control" id="regAge" placeholder="Enter your age">
            </div>
            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-success">Register</button>
            </div>
            <p class="text-center">Already have an account? 
              <a href="reg.html" class="text-primary">Register here</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  
    <script>
      function toggleForms() {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        if (loginForm.style.display === "none") {
          loginForm.style.display = "block";
          registerForm.style.display = "none";
        } else {
          loginForm.style.display = "none";
          registerForm.style.display = "block";
        }
      }
    </script>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
